CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=1

CONFIG_PWM=y
CONFIG_NRFX_PWM0=y
CONFIG_NFCT_PINS_AS_GPIOS=y

# ZMK pointing (HID mouse)
CONFIG_ZMK_POINTING=y

# BLE mouse host (central): connection budget = split peripheral link + host
# link + mouse link, plus bond storage for 5 host profiles + the peripheral +
# the mouse (see DESIGN_DETAIL_zmk_ble_mouse_host.md sec. 10 -- this was
# planned before implementation).
CONFIG_BT_MAX_CONN=3
CONFIG_BT_MAX_PAIRED=8
# Default (3) is a single shared ATT request pool across ALL connections; the
# mouse's multi-characteristic GATT discovery (service + characteristics +
# per-report CCC auto-discovery + report map read) alongside the host link can
# exhaust it (bt_gatt_discover failing ENOMEM, leaving the mouse connected but
# never subscribed / unresponsive) -- see zmk-ble-mouse-host's devkit.conf.
CONFIG_BT_ATT_TX_COUNT=8
# One-shot helper to wipe all BLE host profiles (not the mouse bond) on boot
# so a host can re-pair without a &bt BT_CLR key. Enable only when needed.
CONFIG_ZMK_BLE_MOUSE_HOST_FORGET_ON_BOOT=n

# OSRB38C9AA IR receiver (D12) -> debug log
CONFIG_IR_RX=y
CONFIG_IR_RX_LOG_LEVEL_DBG=y

# Send each IR command as 10 repeated NEC frames per key press (default 3).
CONFIG_IR_TX_REPEAT_COUNT=10

# Suppress ZMK debug logs (keeps INFO+, e.g. ble-dump).
CONFIG_ZMK_LOGGING_MINIMAL=y

# Silence the periodic host-link RSSI log (zmk-ble-debug; defaults on).
CONFIG_ZMK_BLE_RSSI=n

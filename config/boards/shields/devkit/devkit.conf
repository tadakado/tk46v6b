CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=2
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=5
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=5

CONFIG_PWM=y
CONFIG_NRFX_PWM0=y
CONFIG_NFCT_PINS_AS_GPIOS=y

# ZMK pointing (HID mouse)
CONFIG_ZMK_POINTING=y

# BLE mouse host (central): an extra connection + bond slot for the mouse,
# on top of the host link. (Module auto-enables from the devicetree node.)
CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=6
# Default (3) is a single shared ATT request pool across ALL connections; with
# a host link + a mouse doing multi-characteristic GATT discovery (service +
# characteristics + per-report CCC auto-discovery + report map read) right
# after a fast reconnect, it can run out (bt_gatt_discover failing ENOMEM,
# leaving the mouse connected but never subscribed / unresponsive).
CONFIG_BT_ATT_TX_COUNT=8
# One-shot helper to wipe all bonds on boot and force a clean re-pair. Enable
# only when you need to re-pair; normal operation reconnects to the saved bond.
CONFIG_ZMK_BLE_MOUSE_HOST_FORGET_ON_BOOT=n

# Quiet during BLE mouse host debugging (periodic host-link RSSI log).
CONFIG_ZMK_BLE_RSSI=n

# OSRB38C9AA IR receiver (D12) -> debug log
CONFIG_IR_RX=y
CONFIG_IR_RX_LOG_LEVEL_DBG=y

# Send each IR command as 10 repeated NEC frames per key press (default 3).
CONFIG_IR_TX_REPEAT_COUNT=10

# Suppress ZMK debug logs (keeps INFO+, e.g. ble-dump).
CONFIG_ZMK_LOGGING_MINIMAL=y
